# Add custom overrides in hyprland/custom/*.conf

exec = hyprctl dispatch submap global
exec-once = /usr/lib/polkit-kde/polkit-kde-authentication-agent-1
submap = global

# Modular configuration
source = ~/.config/hypr/hyprland/env.conf
source = ~/.config/hypr/hyprland/general.conf
source = ~/.config/hypr/hyprland/input.conf
source = ~/.config/hypr/hyprland/misc.conf
source = ~/.config/hypr/hyprland/animations.conf
source = ~/.config/hypr/hyprland/decoration.conf
source = ~/.config/hypr/hyprland/group.conf
source = ~/.config/hypr/hyprland/gestures.conf
source = ~/.config/hypr/hyprland/execs.conf
source = ~/.config/hypr/hyprland/rules.conf
source = ~/.config/hypr/hyprland/colors.conf
source = ~/.config/hypr/hyprland/keybinds.conf

# Custom overrides (keeps upstream untouched)
source = ~/.config/hypr/hyprland/custom/*.conf
