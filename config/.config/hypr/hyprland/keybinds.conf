# ╔══════════════════════════════════════════════════════════════╗
# ║  JarvOS — Keybindings (Caelestia Shell)                    ║
# ║  Lines ending with `# [hidden]` won't show on cheatsheet   ║
# ║  Lines starting with #! are section headings                ║
# ╚══════════════════════════════════════════════════════════════╝

#!
##! Shell

# Super key — launcher (Caelestia bottom drawer)
bindi = Super, Super_L, global, caelestia:launcher
bindin = Super, catchall, global, caelestia:launcherInterrupt
bindin = Super, mouse:272, global, caelestia:launcherInterrupt # [hidden]
bindin = Super, mouse:273, global, caelestia:launcherInterrupt # [hidden]
bindin = Super, mouse:274, global, caelestia:launcherInterrupt # [hidden]
bindin = Super, mouse:275, global, caelestia:launcherInterrupt # [hidden]
bindin = Super, mouse:276, global, caelestia:launcherInterrupt # [hidden]
bindin = Super, mouse:277, global, caelestia:launcherInterrupt # [hidden]
bindin = Super, mouse_up, global, caelestia:launcherInterrupt # [hidden]
bindin = Super, mouse_down, global, caelestia:launcherInterrupt # [hidden]

# Panels
bindd = Super, N, Toggle sidebar, global, caelestia:sidebar # Toggle notification sidebar
bindd = Super, K, Toggle all panels, global, caelestia:showall # Show all panels
bindd = Super, D, Toggle dashboard, global, caelestia:dashboard # Dashboard (top drawer)
bind = Super, I, exec, caelestia shell controlCenter open # Settings

# Brightness (via Caelestia OSD)
bindl = , XF86MonBrightnessUp, global, caelestia:brightnessUp # [hidden]
bindl = , XF86MonBrightnessDown, global, caelestia:brightnessDown # [hidden]

# Volume
bindle=, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 2%+ # [hidden]
bindle=, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%- # [hidden]
bindl = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_SINK@ toggle # [hidden]
bindld = Super+Shift,M, Toggle mute, exec, wpctl set-mute @DEFAULT_SINK@ toggle # [hidden]
bindl = Alt ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle # [hidden]
bindl = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle # [hidden]
bindld = Super+Alt,M, Toggle mic, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle # [hidden]

# Wallpaper & shell management
bindd = Super+Ctrl+Alt, W, Change wallpaper, exec, caelestia wallpaper -r # Random wallpaper
bind = Super+Ctrl+Alt, R, exec, qs -c caelestia kill; sleep 0.2; caelestia shell -d # Restart shell

# Notifications
bindl = Ctrl+Alt, C, global, caelestia:clearNotifs # [hidden]

##! Utilities

# Screenshots (Caelestia area picker)
bind = Super+Shift, S, global, caelestia:screenshotFreeze # Screen snip (freeze)
bind = Super+Shift+Alt, S, global, caelestia:screenshot # Screen snip (no freeze)
bindld = ,Print, Screenshot >> clipboard, exec, grim - | wl-copy # Full screenshot
bindld = Ctrl,Print, Screenshot >> save, exec, mkdir -p $(xdg-user-dir PICTURES)/Screenshots && grim $(xdg-user-dir PICTURES)/Screenshots/Screenshot_"$(date '+%Y-%m-%d_%H.%M.%S')".png # Screenshot to file

# Clipboard & emoji
bindd = Super, V, Clipboard history, exec, pkill fuzzel || cliphist list | fuzzel --match-mode fzf --dmenu | cliphist decode | wl-copy # Clipboard history
bindd = Super, Period, Emoji, exec, pkill fuzzel || ~/.config/hypr/hyprland/scripts/fuzzel-emoji.sh copy # Emoji

##! Screen
binde = Super, Minus, exec, ~/.config/hypr/hyprland/scripts/zoom.sh decrease 0.1 # Zoom out
binde = Super, Equal, exec, ~/.config/hypr/hyprland/scripts/zoom.sh increase 0.1 # Zoom in

#!
##! Window
# Mouse
bindm = Super, mouse:272, movewindow # Move
bindm = Super, mouse:274, movewindow # [hidden]
bindm = Super, mouse:273, resizewindow # Resize

bind = Alt, F4, killactive, # [hidden]
bind = Super, Q, killactive, # Close
bind = Super+Shift+Alt+Ctrl, Q, exec, hyprctl kill # [hidden]

# Positioning
bind = Super, Space, togglefloating, # Float/Tile
bind = Super, Y, layoutmsg, togglesplit # Horizontal/Vertical
bind = Super, F, fullscreen, 1 # Maximize
bind = Super+Shift, F, fullscreen, 0 # [hidden] Fullscreen
bind = Super+Alt, F, fullscreenstate, 0 3 # [hidden]
bind = Super, P, pin # [hidden] Pin

# Split ratio
binde = Super, Semicolon, splitratio, -0.1 # [hidden]
binde = Super, Slash, splitratio, +0.1 # [hidden]

# Focus
bind = Super, Left, movefocus, l # [hidden]
bind = Super, Right, movefocus, r # [hidden]
bind = Super, Up, movefocus, u # [hidden]
bind = Super, Down, movefocus, d # [hidden]
bind = Super, BracketLeft, movefocus, l # [hidden]
bind = Super, BracketRight, movefocus, r # [hidden]

# Move window
bind = Super+Alt, Left, movewindow, l # [hidden]
bind = Super+Alt, Right, movewindow, r # [hidden]
bind = Super+Alt, Up, movewindow, u # [hidden]
bind = Super+Alt, Down, movewindow, d # [hidden]

# Window groups
bindd = Super, Comma, Toggle window group, togglegroup # Toggle group
bindd = Super, U, Ungroup window, moveoutofgroup # Ungroup
binde = Ctrl+Alt, Tab, changegroupactive, f # [hidden]
binde = Ctrl+Shift+Alt, Tab, changegroupactive, b # [hidden]
bind = Super+Shift, Comma, lockactivegroup, toggle # [hidden]

# Send to workspace
bind = Super+Shift, 1, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 1 # [hidden]
bind = Super+Shift, 2, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 2 # [hidden]
bind = Super+Shift, 3, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 3 # [hidden]
bind = Super+Shift, 4, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 4 # [hidden]
bind = Super+Shift, 5, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 5 # [hidden]
bind = Super+Shift, 6, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 6 # [hidden]
bind = Super+Shift, 7, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 7 # [hidden]
bind = Super+Shift, 8, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 8 # [hidden]
bind = Super+Shift, 9, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 9 # [hidden]
bind = Super+Shift, 0, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 10 # [hidden]

bind = Super+Shift, left, movetoworkspace, -1 # [hidden]
bind = Super+Shift, right, movetoworkspace, +1 # [hidden]
bind = Super+Shift, mouse_down, movetoworkspace, -1 # [hidden]
bind = Super+Shift, mouse_up, movetoworkspace, +1 # [hidden]
bind = Super+Alt, Page_Down, movetoworkspace, r+1 # [hidden]
bind = Super+Alt, Page_Up, movetoworkspace, r-1 # [hidden]
bind = Super+Shift, Page_Down, movetoworkspace, +1 # [hidden]
bind = Super+Shift, Page_Up, movetoworkspace, -1 # [hidden]

bind = Super+Shift, S, movetoworkspacesilent, special # Send to scratchpad
bind = Super+Alt, S, movetoworkspacesilent, special # [hidden]

bind = Alt, Tab, cyclenext # [hidden]
bind = Alt, Tab, bringactivetotop, # [hidden]

##! Workspace
bind = Super, 1, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 1 # [hidden]
bind = Super, 2, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 2 # [hidden]
bind = Super, 3, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 3 # [hidden]
bind = Super, 4, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 4 # [hidden]
bind = Super, 5, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 5 # [hidden]
bind = Super, 6, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 6 # [hidden]
bind = Super, 7, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 7 # [hidden]
bind = Super, 8, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 8 # [hidden]
bind = Super, 9, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 9 # [hidden]
bind = Super, 0, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 10 # [hidden]

bind = Super, Tab, workspace, previous # Focus previous
bind = Ctrl+Super, Right, workspace, r+1 # [hidden]
bind = Ctrl+Super, Left, workspace, r-1 # [hidden]
bind = Ctrl+Super, Page_Down, workspace, +1 # [hidden]
bind = Ctrl+Super, Page_Up, workspace, -1 # [hidden]
bind = Super, Page_Down, workspace, r+1 # [hidden]
bind = Super, Page_Up, workspace, r-1 # [hidden]
bind = Super, mouse_up, workspace, +1 # [hidden]
bind = Super, mouse_down, workspace, -1 # [hidden]
bind = Ctrl+Super, mouse_up, workspace, +10 # [hidden]
bind = Ctrl+Super, mouse_down, workspace, -10 # [hidden]

# Special workspaces
bind = Super, S, togglespecialworkspace, # Toggle scratchpad
bind = Super, mouse:275, togglespecialworkspace, # [hidden]
bind = Ctrl+Super, BracketLeft, workspace, -1 # [hidden]
bind = Ctrl+Super, BracketRight, workspace, +1 # [hidden]
bind = Ctrl+Super, Up, workspace, r-5 # [hidden]
bind = Ctrl+Super, Down, workspace, r+5 # [hidden]

bindd = Ctrl+Shift, Escape, System monitor, exec, pgrep btop && hyprctl dispatch togglespecialworkspace sysmon || kitty -1 fish -c btop # Task manager

#!
##! Session
bindd = Super, L, Lock, global, caelestia:lock # Lock
bindd = Ctrl+Alt, Delete, Toggle session menu, global, caelestia:session # Session menu
bindld = Super+Shift, L, Suspend, exec, systemctl suspend-then-hibernate # Sleep
bindd = Super+Ctrl+Alt, Delete, Shutdown, exec, systemctl poweroff || loginctl poweroff # Shutdown

##! Media
bindl = Ctrl+Super, Space, global, caelestia:mediaToggle # [hidden]
bindl = , XF86AudioPlay, global, caelestia:mediaToggle # [hidden]
bindl = , XF86AudioPause, global, caelestia:mediaToggle # [hidden]
bindl = , XF86AudioNext, global, caelestia:mediaNext # [hidden]
bindl = , XF86AudioPrev, global, caelestia:mediaPrev # [hidden]
bindl = , XF86AudioStop, global, caelestia:mediaStop # [hidden]

##! Apps
bind = Super, Return, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "kitty -1" "foot" "alacritty" "wezterm" "konsole" "kgx" "uxterm" "xterm" # Terminal
bind = Super, T, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "kitty -1" "foot" "alacritty" "wezterm" "konsole" "kgx" "uxterm" "xterm" # [hidden]
bind = Ctrl+Alt, T, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "kitty -1" "foot" "alacritty" "wezterm" "konsole" "kgx" "uxterm" "xterm" # [hidden]
bind = Super, E, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "nautilus" "thunar" "dolphin" "nemo" # File manager
bind = Super, W, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "zen-browser" "google-chrome-stable" "firefox" "brave" "chromium" # Browser
bind = Super, C, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "code" "codium" "zed" "kate" "gnome-text-editor" # Code editor
bind = Super, X, exec, gnome-text-editor # Text editor

bind = Super, B, exec, pgrep qalculate && hyprctl dispatch togglespecialworkspace calc || qalculate-gtk # Calculator
bind = Super, O, exec, obsidian -enable-features=UseOzonePlatform -ozone-platform=wayland # Obsidian
bind = Super, A, exec, claude-desktop-native -enable-features=UseOzonePlatform -ozone-platform=wayland # Claude

bind = Super, M, exec, pgrep spotify && hyprctl dispatch togglespecialworkspace spotify || spotify --enable-features=UseOzonePlatform --ozone-platform=wayland # Spotify
bind = Super, Z, exec, pgrep -f ferdium && hyprctl dispatch togglespecialworkspace ferdium || ferdium --enable-features=UseOzonePlatform --ozone-platform=wayland # Ferdium

bind = Ctrl+Super, Backslash, resizeactive, exact 640 480 # [hidden]
