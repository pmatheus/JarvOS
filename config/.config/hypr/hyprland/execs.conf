# Cursor
exec-once = hyprctl dispatch workspace 1
exec-once = hyprctl setcursor Bibata-Modern-Classic 24

# Wallpaper + hypr-arch M3 color theming
exec-once = sleep 0.5 && [ "$(hyprctl monitors -j | jq 'length')" -eq 1 ] && awww-daemon --format xrgb --no-cache || awww-daemon --format xrgb
exec-once = ~/.config/quickshell/scripts/colors/applycolor.sh

# JarvOS shell (Caelestia design, horizontal top bar)
exec-once = qs -p ~/.config/quickshell/jarvos/shell.qml &> /tmp/quickshell_log.txt

# Input method
exec-once = fcitx5

# Core components
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 || /usr/libexec/polkit-gnome-authentication-agent-1 || /usr/lib/polkit-kde-authentication-agent-1 || /usr/libexec/polkit-kde-authentication-agent-1
exec-once = hypridle
exec-once = dbus-update-activation-environment --all
exec-once = sleep 1 && dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = hyprpm reload

# Audio
exec-once = easyeffects --gapplication-service

# Clipboard history
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Auto-start apps
exec-once = [workspace special:ferdium silent] ferdium --enable-features=UseOzonePlatform --ozone-platform=wayland
