animations {
    enabled = true

    # ── Curves ──────────────────────────────────────────────────
    # Caelestia core curves — proper physics: decel on enter, accel on exit
    bezier = specialWorkSwitch, 0.05, 0.7, 0.1, 1
    bezier = emphasizedAccel, 0.3, 0, 0.8, 0.15
    bezier = emphasizedDecel, 0.05, 0.7, 0.1, 1

    # Standard Material 3 curves
    bezier = standard, 0.2, 0, 0, 1
    bezier = standardDecel, 0.0, 0, 0, 1

    # Expressive curves for fluid, springy motion
    bezier = spring, 0.15, 1.15, 0.4, 1.0
    bezier = snappy, 0.25, 1.0, 0.3, 1.0
    bezier = smooth, 0.33, 1.0, 0.68, 1.0

    # ── Windows ─────────────────────────────────────────────────
    # Springy open, quick close — windows feel alive
    animation = windowsIn, 1, 4, spring, popin 85%
    animation = windowsOut, 1, 3, emphasizedAccel, popin 85%
    animation = windowsMove, 1, 4, snappy

    # ── Layers (panels, drawers, overlays) ──────────────────────
    # Slide + fade for a polished feel
    animation = layersIn, 1, 4, emphasizedDecel, slide
    animation = layersOut, 1, 3, emphasizedAccel, slide
    animation = fadeLayers, 1, 4, smooth

    # ── Fades ───────────────────────────────────────────────────
    animation = fadeIn, 1, 4, emphasizedDecel
    animation = fadeOut, 1, 3, emphasizedAccel
    animation = fadeDim, 1, 5, smooth
    animation = fadeShadow, 1, 5, smooth

    # ── Borders ─────────────────────────────────────────────────
    animation = border, 1, 5, standard
    animation = borderangle, 1, 40, smooth, loop

    # ── Workspaces ──────────────────────────────────────────────
    animation = workspaces, 1, 4, snappy, slidefade 20%

    # ── Special Workspaces ──────────────────────────────────────
    # Vertical slide with fade — the signature Caelestia transition
    animation = specialWorkspace, 1, 4, specialWorkSwitch, slidefadevert 15%
}
