animations {
    enabled = true

    # Expressive spatial curves (Material Design 3 motion)
    bezier = expressiveFastSpatial, 0.42, 1.67, 0.21, 0.90
    bezier = expressiveSlowSpatial, 0.39, 1.29, 0.35, 0.98
    bezier = expressiveDefaultSpatial, 0.38, 1.21, 0.22, 1.00

    # Emphasis curves
    bezier = emphasizedDecel, 0.05, 0.7, 0.1, 1
    bezier = emphasizedAccel, 0.3, 0, 0.8, 0.15

    # Standard & menu curves
    bezier = standardDecel, 0, 0, 0, 1
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.52, 0.03, 0.72, 0.08

    # Special workspace transition curve (from Caelestia)
    bezier = specialWorkSwitch, 0.05, 0.7, 0.1, 1

    # Window animations
    animation = windowsIn, 1, 3, emphasizedDecel, popin 80%
    animation = windowsOut, 1, 2, emphasizedDecel, popin 100%
    animation = windowsMove, 1, 3, emphasizedDecel, slide

    # Border color transitions
    animation = border, 1, 10, emphasizedDecel

    # Layer/panel animations
    animation = layersIn, 1, 2.7, emphasizedDecel, popin 93%
    animation = layersOut, 1, 2.4, menu_accel, popin 100%

    # Fade transitions
    animation = fadeLayersIn, 1, 0.5, menu_decel
    animation = fadeLayersOut, 1, 2.7, menu_accel
    animation = fade, 1, 6, standardDecel
    animation = fadeDim, 1, 6, standardDecel

    # Workspace switching
    animation = workspaces, 1, 7, menu_decel, slide

    # Special workspace — slidefadevert for polished vertical slide+fade
    animation = specialWorkspaceIn, 1, 2.8, specialWorkSwitch, slidefadevert 15%
    animation = specialWorkspaceOut, 1, 1.2, emphasizedAccel, slidefadevert 15%
}
