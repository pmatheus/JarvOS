# ╔══════════════════════════════════════════════════════════════╗
# ║  JarvOS — Window, Workspace & Layer Rules                  ║
# ╚══════════════════════════════════════════════════════════════╝

# ######## Window rules ########

# Disable blur for xwayland context menus
windowrule = no_blur on, match:class ^()$, match:title ^()$

# Floating windows
windowrule = float on, match:class ^(blueberry\.py)$
windowrule = float on, match:class ^(steam)$
windowrule = float on, match:class ^(guifetch)$
windowrule = float on, match:class ^(pavucontrol)$
windowrule = size 45%, match:class ^(pavucontrol)$
windowrule = center on, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(org.pulseaudio.pavucontrol)$
windowrule = size 45%, match:class ^(org.pulseaudio.pavucontrol)$
windowrule = center on, match:class ^(org.pulseaudio.pavucontrol)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = size 45%, match:class ^(nm-connection-editor)$
windowrule = center on, match:class ^(nm-connection-editor)$
windowrule = float on, match:class .*plasmawindowed.*
windowrule = float on, match:class kcm_.*
windowrule = float on, match:class .*bluedevilwizard
windowrule = float on, match:title .*Welcome
windowrule = float on, match:title ^(illogical-impulse Settings)$
windowrule = float on, match:class xdg.desktop.portal.gtk
windowrule = float on, match:class Windscribe
windowrule = float on, match:class ^(org\.gnome\.Settings)$
windowrule = size 70% 80%, match:class ^(org\.gnome\.Settings)$
windowrule = center on, match:class ^(org\.gnome\.Settings)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(org\.gnome\.FileRoller)$
windowrule = float on, match:class ^(file-roller)$
windowrule = float on, match:class ^(feh)$
windowrule = float on, match:class ^(imv)$

# No appearance — kde-material-you-colors window
windowrule = float on, match:class ^(plasma-changeicons)$
windowrule = no_initial_focus on, match:class ^(plasma-changeicons)$
windowrule = move 999999 999999, match:class ^(plasma-changeicons)$

# Tiling
windowrule = tile on, match:class ^dev\.warp\.Warp$

# Picture-in-Picture
windowrule = float on, match:title ^([Pp]icture[- ]?[Ii]n[- ]?[Pp]icture)(.*)$
windowrule = keep_aspect_ratio on, match:title ^([Pp]icture[- ]?[Ii]n[- ]?[Pp]icture)(.*)$
windowrule = move 73% 72%, match:title ^([Pp]icture[- ]?[Ii]n[- ]?[Pp]icture)(.*)$
windowrule = size 25%, match:title ^([Pp]icture[- ]?[Ii]n[- ]?[Pp]icture)(.*)$
windowrule = pin on, match:title ^([Pp]icture[- ]?[Ii]n[- ]?[Pp]icture)(.*)$

# Dialog windows — float+center
windowrule = center on, match:title ^(Open File)(.*)$
windowrule = center on, match:title ^(Select a File)(.*)$
windowrule = center on, match:title ^(Select file)(.*)$
windowrule = center on, match:title ^(Choose wallpaper)(.*)$
windowrule = center on, match:title ^(Open Folder)(.*)$
windowrule = center on, match:title ^(Save As)(.*)$
windowrule = center on, match:title ^(Library)(.*)$
windowrule = center on, match:title ^(File Upload)(.*)$
windowrule = float on, match:title ^(Open File)(.*)$
windowrule = float on, match:title ^(Select a File)(.*)$
windowrule = float on, match:title ^(Select file)(.*)$
windowrule = float on, match:title ^(Choose wallpaper)(.*)$
windowrule = float on, match:title ^(Open Folder)(.*)$
windowrule = float on, match:title ^(Save As)(.*)$
windowrule = float on, match:title ^(Library)(.*)$
windowrule = float on, match:title ^(File Upload)(.*)$

# Creative software — force opaque
windowrule = opaque on, match:class ^(krita|gimp|inkscape|darktable|resolve|kdenlive|shotcut|blender|godot)$

# Games — tearing + idle inhibit
windowrule = immediate on, match:title .*\.exe
windowrule = immediate on, match:title .*minecraft.*
windowrule = immediate on, match:class ^(steam_app)
windowrule = opaque on, match:class ^(steam_app)
windowrule = idle_inhibit always, match:class ^(steam_app)

# Steam UI
windowrule = rounding 10, match:class steam
windowrule = float on, match:title Friends List, match:class steam

# XWayland popup cleanup
windowrule = no_dim on, match:xwayland 1, match:title win[0-9]+
windowrule = no_shadow on, match:xwayland 1, match:title win[0-9]+

# ######## Special workspace rules ########
workspace = special:special, gapsout:30

workspace = special:spotify, gapsout:30
windowrule = workspace special:spotify, match:class spotify

workspace = special:ferdium, gapsout:30
windowrule = workspace special:ferdium, match:class ferdium

workspace = special:calc, gapsout:30
windowrule = float on, match:class qalculate-gtk
windowrule = center on, match:class qalculate-gtk
windowrule = workspace special:calc, match:class qalculate-gtk

# System monitor (from Caelestia)
workspace = special:sysmon, gapsout:30
windowrule = workspace special:sysmon, match:class btop

# ######## Dynamic workspace gaps ########
# Single-window workspaces get larger gaps for visual breathing room
workspace = w[tv1]s[false], gapsout:20
workspace = f[1]s[false], gapsout:20

# ######## Layer rules ########
layerrule = xray 1, match:namespace .*
layerrule = no_anim on, match:namespace walker
layerrule = no_anim on, match:namespace selection
layerrule = no_anim on, match:namespace overview
layerrule = no_anim on, match:namespace anyrun
layerrule = no_anim on, match:namespace indicator.*
layerrule = no_anim on, match:namespace osk
layerrule = no_anim on, match:namespace hyprpicker

# Fuzzel launcher
layerrule = animation popin 80%, match:namespace launcher
layerrule = blur on, match:namespace launcher

# QuickShell layer rules
layerrule = animation popin 98%, match:namespace quickshell:overview
layerrule = no_anim on, match:namespace gtk4-layer-shell

layerrule = animation slide, match:namespace quickshell:bar
layerrule = animation fade, match:namespace quickshell:screenCorners
layerrule = animation slide right, match:namespace quickshell:sidebarRight
layerrule = animation slide bottom, match:namespace quickshell:osk
layerrule = animation slide bottom, match:namespace quickshell:dock
layerrule = animation fade, match:namespace quickshell:notificationPopup

# QuickShell sidebar — blur with glassmorphism
layerrule = blur on, match:namespace quickshell:sidebarRight
layerrule = ignore_alpha 0.57, match:namespace quickshell:sidebarRight

# Session overlay — full blur
layerrule = blur on, match:namespace quickshell:session
layerrule = no_anim on, match:namespace quickshell:session
layerrule = ignore_alpha 0, match:namespace quickshell:session

# Dim-around for overlay panels
layerrule = dim_around on, match:namespace quickshell:overview
layerrule = dim_around on, match:namespace quickshell:cheatsheet
