# ╔══════════════════════════════════════════════════════════════╗
# ║  JarvOS — Window, Workspace & Layer Rules                  ║
# ╚══════════════════════════════════════════════════════════════╝

# ######## Global visual rules ########

# 95% opacity on all non-fullscreen windows — the Caelestia signature look
windowrule = opacity 0.95 override, match:fullscreen false

# Force opaque on apps that need it (native transparency or visual accuracy)
windowrule = opaque true, match:class foot|kitty|alacritty|org\.quickshell|imv|swappy

# Auto-center all floating windows (except xwayland popups)
windowrule = center true, match:float true, match:xwayland false

# ######## Floating windows ########

windowrule = float true, match:class guifetch
windowrule = float true, match:class yad
windowrule = float true, match:class zenity
windowrule = float true, match:class wev
windowrule = float true, match:class org\.gnome\.FileRoller
windowrule = float true, match:class file-roller
windowrule = float true, match:class blueman-manager
windowrule = float true, match:class feh
windowrule = float true, match:class imv
windowrule = float true, match:class system-config-printer
windowrule = float true, match:class org\.quickshell
windowrule = float true, match:class ^(blueberry\.py)$
windowrule = float true, match:class ^(steam)$
windowrule = float true, match:class ^(pavucontrol)$
windowrule = float true, match:class ^(org.pulseaudio.pavucontrol)$
windowrule = float true, match:class ^(nm-connection-editor)$
windowrule = float true, match:class .*plasmawindowed.*
windowrule = float true, match:class kcm_.*
windowrule = float true, match:class .*bluedevilwizard
windowrule = float true, match:title .*Welcome
windowrule = float true, match:title ^(illogical-impulse Settings)$
windowrule = float true, match:class xdg.desktop.portal.gtk
windowrule = float true, match:class Windscribe

# Float + resize + center
windowrule = size 45%, match:class ^(pavucontrol)$
windowrule = size 45%, match:class ^(org.pulseaudio.pavucontrol)$
windowrule = size 45%, match:class ^(nm-connection-editor)$

windowrule = float true, match:class foot, match:title nmtui
windowrule = size 60% 70%, match:class foot, match:title nmtui
windowrule = center 1, match:class foot, match:title nmtui

windowrule = float true, match:class org\.gnome\.Settings
windowrule = size 70% 80%, match:class org\.gnome\.Settings
windowrule = center 1, match:class org\.gnome\.Settings

windowrule = float true, match:class org\.pulseaudio\.pavucontrol|yad-icon-browser
windowrule = size 60% 70%, match:class org\.pulseaudio\.pavucontrol|yad-icon-browser
windowrule = center 1, match:class org\.pulseaudio\.pavucontrol|yad-icon-browser

windowrule = float true, match:class nwg-look
windowrule = size 50% 60%, match:class nwg-look
windowrule = center 1, match:class nwg-look

windowrule = float true, match:class com\.github\.GradienceTeam\.Gradience

# No appearance — kde-material-you-colors window
windowrule = float true, match:class ^(plasma-changeicons)$
windowrule = no_initial_focus true, match:class ^(plasma-changeicons)$
windowrule = move 999999 999999, match:class ^(plasma-changeicons)$

# Tiling
windowrule = tile true, match:class ^dev\.warp\.Warp$

# ######## Picture-in-Picture ########
windowrule = move 100%-w-2% 100%-w-3%, match:title ^([Pp]icture[- ]?[Ii]n[- ]?[Pp]icture)(.*)$
windowrule = keep_aspect_ratio true, match:title ^([Pp]icture[- ]?[Ii]n[- ]?[Pp]icture)(.*)$
windowrule = float true, match:title ^([Pp]icture[- ]?[Ii]n[- ]?[Pp]icture)(.*)$
windowrule = pin true, match:title ^([Pp]icture[- ]?[Ii]n[- ]?[Pp]icture)(.*)$

# ######## Dialog windows ########
windowrule = float true, match:title (Select|Open)( a)? (File|Folder)(s)?
windowrule = float true, match:title File (Operation|Upload)( Progress)?
windowrule = float true, match:title .* Properties
windowrule = float true, match:title Export Image as PNG
windowrule = float true, match:title GIMP Crash Debug
windowrule = float true, match:title Save As
windowrule = float true, match:title Library
windowrule = float true, match:title ^(Open File)(.*)$
windowrule = float true, match:title ^(Select a File)(.*)$
windowrule = float true, match:title ^(Select file)(.*)$
windowrule = float true, match:title ^(Choose wallpaper)(.*)$
windowrule = float true, match:title ^(Open Folder)(.*)$
windowrule = float true, match:title ^(File Upload)(.*)$

# ######## Creative software — force opaque ########
windowrule = opaque true, match:class krita|gimp|inkscape|darktable|resolve|kdenlive|shotcut|blender|godot

# ######## Games ########
# Steam, Lutris/Wine, Gamescope — tearing + idle inhibit + opaque
windowrule = opaque true, match:class (steam_app_(default|[0-9]+))|gamescope
windowrule = immediate true, match:class (steam_app_(default|[0-9]+))|gamescope
windowrule = idle_inhibit always, match:class (steam_app_(default|[0-9]+))|gamescope
windowrule = immediate true, match:title .*\.exe
windowrule = immediate true, match:title .*minecraft.*

# Steam UI
windowrule = rounding 10, match:class steam
windowrule = float true, match:title Friends List, match:class steam

# Ueberzugpp
windowrule = float true, match:class ^(ueberzugpp_.*)$
windowrule = no_initial_focus true, match:class ^(ueberzugpp_.*)$

# XWayland popup cleanup
windowrule = no_dim true, match:xwayland 1, match:title win[0-9]+
windowrule = no_shadow true, match:xwayland 1, match:title win[0-9]+
windowrule = rounding 10, match:xwayland 1, match:title win[0-9]+

# ######## Special workspace rules ########
workspace = special:special, gapsout:30

workspace = special:spotify, gapsout:30
windowrule = workspace special:spotify, match:class spotify

workspace = special:ferdium, gapsout:30
windowrule = workspace special:ferdium, match:class ferdium

workspace = special:calc, gapsout:30
windowrule = float true, match:class qalculate-gtk
windowrule = center true, match:class qalculate-gtk
windowrule = workspace special:calc, match:class qalculate-gtk

workspace = special:sysmon, gapsout:30
windowrule = workspace special:sysmon, match:class btop

# Music apps → special:spotify (Caelestia pattern)
windowrule = workspace special:spotify, match:class feishin|Supersonic|Cider|com.github.th_ch.youtube_music|Plexamp
windowrule = workspace special:spotify, match:initial_title Spotify( Free)?

# Communication apps → special:ferdium
windowrule = workspace special:ferdium, match:class discord|equibop|vesktop|whatsapp

# ######## Dynamic workspace gaps ########
# Single-window workspaces get larger gaps for visual breathing room
workspace = w[tv1]s[false], gapsout:20
workspace = f[1]s[false], gapsout:20

# ######## Layer rules ########

# Utility overlays — fade
layerrule = animation fade, match:namespace hyprpicker
layerrule = animation fade, match:namespace logout_dialog
layerrule = animation fade, match:namespace selection
layerrule = animation fade, match:namespace wayfreeze

# Fuzzel launcher
layerrule = animation popin 80%, match:namespace launcher
layerrule = blur true, match:namespace launcher

# QuickShell layers
layerrule = animation popin 98%, match:namespace quickshell:overview
layerrule = no_anim true, match:namespace gtk4-layer-shell

layerrule = animation slide, match:namespace quickshell:bar
layerrule = animation fade, match:namespace quickshell:screenCorners
layerrule = animation slide right, match:namespace quickshell:sidebarRight
layerrule = animation slide bottom, match:namespace quickshell:osk
layerrule = animation slide bottom, match:namespace quickshell:dock
layerrule = animation fade, match:namespace quickshell:notificationPopup

# QuickShell sidebar — glassmorphism blur
layerrule = blur true, match:namespace quickshell:sidebarRight
layerrule = ignore_alpha 0.57, match:namespace quickshell:sidebarRight

# QuickShell bar — blur
layerrule = blur true, match:namespace quickshell:bar
layerrule = ignore_alpha 0.57, match:namespace quickshell:bar

# Session overlay — full blur
layerrule = blur true, match:namespace quickshell:session
layerrule = no_anim true, match:namespace quickshell:session
layerrule = ignore_alpha 0, match:namespace quickshell:session

# Dim-around for overlay panels
layerrule = dim_around true, match:namespace quickshell:overview
layerrule = dim_around true, match:namespace quickshell:cheatsheet
